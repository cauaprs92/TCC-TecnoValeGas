<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TecnoVale Gás — Login</title>
  <link rel="icon" href="/images/tecnovale.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,700;1,800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:      #F97316;
      --orange-dark: #EA580C;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
    }

    /* ── Painel esquerdo ── */
    .panel-left {
      flex: 1;
      background: linear-gradient(138deg, #0F172A 0%, #0F172A 75%, #7c2d12 90%, #C2410C 100%);
      display: flex;
      flex-direction: column;
      padding: 44px 56px;
      position: relative;
      overflow: hidden;
    }


    .brand-logo {
      display: flex;
      align-items: center;
      z-index: 1;
    }

    .brand-logo img { height: 140px; width: auto; }

    .panel-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 40px;
      z-index: 1;
    }

    .panel-content {
      z-index: 1;
      text-align: left;
    }

    .panel-content h1 {
      font-size: clamp(54px, 6.5vw, 84px);
      font-weight: 800;
      color: #fff;
      line-height: 1.0;
      margin-bottom: 22px;
      font-style: italic;
    }

    .panel-content p {
      font-size: 17px;
      font-style: italic;
      color: rgba(255,255,255,0.72);
      line-height: 1.75;
      max-width: 400px;
    }

    .panel-content p strong {
      color: var(--orange);
      font-style: italic;
      font-weight: 600;
    }

    .panel-footer {
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 1;
    }

    .shield-icon {
      width: 42px; height: 42px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      color: rgba(255,255,255,0.55);
      font-size: 18px;
    }

    .panel-footer p {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      line-height: 1.55;
    }

    /* ── Painel direito ── */
    .panel-right {
      flex: 1;
      background: #F1F5F9;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .login-card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 44px;
      width: 100%;
      max-width: 448px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.09);
    }

    .card-logo {
      display: flex;
      align-items: center;
      margin-bottom: 38px;
    }

    .card-logo img { height: 56px; width: auto; }

    .card-logo-text {
      font-size: 16px;
      font-weight: 800;
      color: #0F172A;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .form-group { margin-bottom: 22px; }

    .form-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 600;
      color: #0F172A;
    }

    .forgot-link {
      font-size: 13px;
      font-weight: 500;
      color: var(--orange);
      text-decoration: none;
      transition: opacity .15s;
    }
    .forgot-link:hover { opacity: .75; }

    .input-wrap { position: relative; }

    input[type="email"],
    input[type="password"],
    input[type="text"] {
      width: 100%;
      border: 1.5px solid #E2E8F0;
      border-radius: 10px;
      padding: 13px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #0F172A;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fff;
    }

    input[type="password"],
    input[type="text"].pwd-input {
      padding-right: 48px;
    }

    input:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.13);
    }

    input::placeholder { color: #94A3B8; }

    .btn-toggle-senha {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: #94A3B8; cursor: pointer;
      font-size: 16px; padding: 4px;
      line-height: 1;
      transition: color .15s;
    }
    .btn-toggle-senha:hover { color: var(--orange); }

    .btn-login {
      width: 100%;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 15px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background .2s, transform .1s, box-shadow .2s;
      letter-spacing: .2px;
    }
    .btn-login:hover  { background: var(--orange-dark); box-shadow: 0 4px 18px rgba(249,115,22,0.38); }
    .btn-login:active { transform: scale(.98); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .error-msg {
      display: none;
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: 9px;
      padding: 11px 14px;
      font-size: 13px;
      color: #DC2626;
      margin-bottom: 20px;
      align-items: center;
      gap: 8px;
    }
    .error-msg.visible { display: flex; }

    @media (max-width: 768px) {
      .panel-left { display: none; }
      body { background: #F1F5F9; justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- ── Lado Esquerdo ── -->
  <div class="panel-left">
    <div class="brand-logo">
      <img src="/images/Logo%20nova.png" alt="TecnoVale Gás" />
    </div>

    <div class="panel-center">
      <div class="panel-content">
        <h1>Bem-vindo</h1>
        <p>
          Há quase 15 anos levando eficiência e confiança ao setor de
          <strong>distribuição de gás.</strong>
        </p>
      </div>

      <div class="panel-footer">
        <div class="shield-icon"><i class="fa-solid fa-shield-halved"></i></div>
        <p>Compromisso, qualidade e excelência que movem nossa história todos os dias.</p>
      </div>
    </div>
  </div>

  <!-- ── Lado Direito ── -->
  <div class="panel-right">
    <div class="login-card">

      <div class="card-logo">
        <img src="/images/tecnovale-removebg-preview.png" alt="TecnoVale Gás" />
      </div>

      <div class="error-msg" id="errorMsg">
        <i class="fa-solid fa-circle-xmark"></i>
        <span id="errorText">Email ou senha incorretos.</span>
      </div>

      <div class="form-group">
        <div class="form-label-row">
          <label for="email">Email</label>
        </div>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <div class="form-label-row">
          <label for="senha">Password</label>
          <a href="#" class="forgot-link" onclick="return false;">Esqueceu a senha?</a>
        </div>
        <div class="input-wrap">
          <input type="password" id="senha" class="pwd-input" placeholder="Digite sua senha" autocomplete="current-password" />
          <button class="btn-toggle-senha" type="button" onclick="toggleSenha()" id="btnToggle">
            <i class="fa-regular fa-eye" id="iconSenha"></i>
          </button>
        </div>
      </div>

      <button class="btn-login" id="btnLogin" onclick="fazerLogin()">Entrar</button>

    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5000';

    if (sessionStorage.getItem('token')) window.location.href = '/dashboard';

    document.addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });

    function toggleSenha() {
      const input = document.getElementById('senha');
      const icon  = document.getElementById('iconSenha');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-regular fa-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'fa-regular fa-eye';
      }
    }

    function mostrarErro(msg) {
      document.getElementById('errorText').textContent = msg;
      document.getElementById('errorMsg').classList.add('visible');
    }

    async function fazerLogin() {
      const email = document.getElementById('email').value.trim();
      const senha = document.getElementById('senha').value.trim();
      const btn   = document.getElementById('btnLogin');

      document.getElementById('errorMsg').classList.remove('visible');
      if (!email) { mostrarErro('Informe o e-mail.'); return; }
      if (!senha) { mostrarErro('Informe a senha.'); return; }

      btn.disabled    = true;
      btn.textContent = 'Entrando...';

      try {
        const res  = await fetch(`${API_BASE}/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, senha }),
        });
        const data = await res.json();

        if (!res.ok || !data.status) {
          mostrarErro(data.msg || 'Email ou senha incorretos.');
          return;
        }

        sessionStorage.setItem('token',     data.token);
        sessionStorage.setItem('nomeLogin', data.nomeLogin || 'Administrador');
        sessionStorage.setItem('idAdmin',   data.idAdmin   || '');
        window.location.href = '/dashboard';

      } catch {
        mostrarErro('Não foi possível conectar ao servidor. Verifique se a API está rodando.');
      } finally {
        btn.disabled    = false;
        btn.textContent = 'Entrar';
      }
    }
  </script>

</body>
</html>
